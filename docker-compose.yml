services:
  postgres:
    image: postgres:16-alpine
    container_name: task-manager-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_manager}
      POSTGRES_USER: ${POSTGRES_USER:-task_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: task-manager-backend
    depends_on:
      - postgres
    environment:
      SERVER_PORT: ${BACKEND_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-task_manager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-task_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-task_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-VGhpc0lzQVNlY3VyZUJhc2U2NEp3dFNlY3JldEtleUZvclByb2plY3QxMjM0NTY=}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-http://localhost:4201,http://localhost:4200,http://localhost:8100,http://127.0.0.1:8100}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: task-manager-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-4201}:4200"

volumes:
  postgres_data:
